[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "zellij"

[scrolling]
history = 10000

[font]
size = 16.0

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[colors.primary]
background = "#181825"
foreground = "#CAD3F5"

[colors.normal]
black   = "#161622"
red     = "#F38BA8"
green   = "#A6E3A1"
yellow  = "#F9E2AF"
blue    = "#89B4FA"
magenta = "#F5C2E7"
cyan    = "#94E2D5"
white   = "#3F3752"

[window]
opacity = 0.7

[window.padding]
x = 15
y = 15
